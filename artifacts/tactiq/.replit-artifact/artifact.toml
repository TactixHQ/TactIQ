kind = "web"
previewPath = "/"
title = "TactIQ — Football Tactics Platform"
version = "1.0.0"
id = "artifacts/tactiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18597

[services.development]
run = "pnpm --filter @workspace/tactiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tactiq", "run", "build" ]
publicDir = "artifacts/tactiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18597"
BASE_PATH = "/"
